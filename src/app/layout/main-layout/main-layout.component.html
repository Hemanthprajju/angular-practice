<div class="layout">
  @if (sidebarOpen()) {
    <button
      type="button"
      class="sidebar-backdrop"
      aria-label="Close menu"
      (click)="closeSidebar()"
    ></button>
  }

  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-icon">📘</span>
        <div>
          <h1>Angular Practice</h1>
          <p class="brand-sub">Interview prep lab</p>
        </div>
      </div>
      <button
        type="button"
        class="btn-close-sidebar"
        aria-label="Close menu"
        (click)="closeSidebar()"
      >
        ✕
      </button>
    </div>

    @if (user(); as u) {
      <div class="user-card">
        <p class="user-name">{{ u.name }}</p>
        <p class="user-meta">{{ u.email }}</p>
        <span class="role-pill role-{{ u.role }}">{{ u.role }}</span>
      </div>
    }

    <nav class="nav">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
          (click)="closeSidebar()"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <button type="button" class="btn-logout" (click)="logout()">Sign out</button>
  </aside>

  <div class="main-column">
    <header class="mobile-header">
      <button
        type="button"
        class="btn-menu"
        [attr.aria-label]="sidebarOpen() ? 'Close menu' : 'Open menu'"
        [attr.aria-expanded]="sidebarOpen()"
        (click)="toggleSidebar()"
      >
        <span class="menu-icon" aria-hidden="true"></span>
      </button>
      <span class="mobile-title">Angular Practice</span>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
